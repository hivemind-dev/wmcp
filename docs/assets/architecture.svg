<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 880 560" font-family="'Segoe UI', system-ui, -apple-system, sans-serif" font-size="13">
  <rect width="880" height="560" fill="#fff"/>
  <defs>
    <marker id="ar" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto"><polygon points="0 0, 10 3.5, 0 7" fill="#000"/></marker>
    <marker id="ar-d" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto"><polygon points="0 0, 10 3.5, 0 7" fill="#555"/></marker>
  </defs>

  <!-- ── Module group ── -->
  <rect x="30" y="30" width="300" height="210" rx="8" fill="none" stroke="#000" stroke-width="1"/>
  <text x="180" y="52" text-anchor="middle" font-weight="700" fill="#000" font-size="12">Sub-module (owns domain logic)</text>
  <rect x="60" y="66" width="240" height="32" rx="6" fill="none" stroke="#000" stroke-width="0.75"/>
  <text x="180" y="87" text-anchor="middle" fill="#000">Module UI</text>
  <rect x="60" y="120" width="240" height="32" rx="6" fill="none" stroke="#000" stroke-width="0.75"/>
  <text x="180" y="141" text-anchor="middle" fill="#000">Module Logic (state + handlers)</text>
  <rect x="60" y="174" width="240" height="32" rx="6" fill="none" stroke="#000" stroke-width="0.75"/>
  <text x="180" y="195" text-anchor="middle" fill="#000" font-weight="600">WmcpClient</text>
  <line x1="180" y1="98" x2="180" y2="118" stroke="#000" stroke-width="1" marker-end="url(#ar)"/>
  <line x1="180" y1="152" x2="180" y2="172" stroke="#000" stroke-width="1" marker-end="url(#ar)"/>
  <text x="180" y="225" text-anchor="middle" fill="#000" font-size="9" font-style="italic">host.override() wraps handlers with super()</text>

  <!-- ── Host group ── -->
  <rect x="480" y="30" width="370" height="210" rx="8" fill="none" stroke="#000" stroke-width="1"/>
  <text x="665" y="52" text-anchor="middle" font-weight="700" fill="#000" font-size="12">Host Application (calls + overrides)</text>
  <rect x="510" y="66" width="310" height="32" rx="6" fill="none" stroke="#000" stroke-width="0.75"/>
  <text x="665" y="87" text-anchor="middle" fill="#000" font-weight="600">WmcpHost</text>
  <rect x="510" y="120" width="310" height="32" rx="6" fill="none" stroke="#000" stroke-width="0.75"/>
  <text x="665" y="141" text-anchor="middle" fill="#000">host:requires bindings</text>
  <rect x="510" y="174" width="310" height="32" rx="6" fill="none" stroke="#000" stroke-width="0.75"/>
  <text x="665" y="195" text-anchor="middle" fill="#000">Auth / API Key Injection</text>
  <line x1="665" y1="98" x2="665" y2="118" stroke="#000" stroke-width="1" marker-end="url(#ar)"/>
  <line x1="665" y1="152" x2="665" y2="172" stroke="#000" stroke-width="1" marker-end="url(#ar)"/>

  <!-- ── Bidirectional arrows between groups ── -->
  <!-- Gap: x=330 to x=480 (150px), center at x=405 -->

  <!-- host.call() — host calls module:capabilities (points left ←) -->
  <line x1="478" y1="100" x2="332" y2="100" stroke="#000" stroke-width="1" marker-end="url(#ar)"/>
  <text x="405" y="95" text-anchor="middle" fill="#000" font-size="11" font-weight="600">host.call()</text>
  <text x="405" y="114" text-anchor="middle" fill="#000" font-size="9">module:capabilities</text>

  <!-- wmcpClient.call() — module calls host:requires (points right →) -->
  <line x1="332" y1="140" x2="478" y2="140" stroke="#000" stroke-width="1" marker-end="url(#ar)"/>
  <text x="405" y="135" text-anchor="middle" fill="#000" font-size="11" font-weight="600">wmcpClient.call()</text>
  <text x="405" y="153" text-anchor="middle" fill="#000" font-size="9">host:requires</text>

  <!-- module:events — module emits to host (dashed, points right →) -->
  <line x1="332" y1="180" x2="478" y2="180" stroke="#555" stroke-width="1" stroke-dasharray="5 3" marker-end="url(#ar-d)"/>
  <text x="405" y="175" text-anchor="middle" fill="#555" font-size="11">module:events</text>

  <!-- module:listeners — host emits to module (dashed, points left ←) -->
  <line x1="478" y1="204" x2="332" y2="204" stroke="#555" stroke-width="1" stroke-dasharray="5 3" marker-end="url(#ar-d)"/>
  <text x="405" y="199" text-anchor="middle" fill="#555" font-size="11">module:listeners</text>

  <!-- ── Backend group ── -->
  <rect x="480" y="330" width="370" height="90" rx="8" fill="none" stroke="#000" stroke-width="1"/>
  <text x="665" y="358" text-anchor="middle" font-weight="700" fill="#000" font-size="12">Backend API Server</text>
  <rect x="510" y="370" width="310" height="34" rx="6" fill="none" stroke="#000" stroke-width="0.75"/>
  <text x="665" y="392" text-anchor="middle" fill="#000">host:requires endpoints</text>

  <!-- Auth → Backend (vertical, for HTTP-backed host:requires) -->
  <line x1="665" y1="206" x2="665" y2="328" stroke="#000" stroke-width="1" marker-end="url(#ar)"/>
  <text x="755" y="264" text-anchor="middle" fill="#000" font-size="11">HTTP + credentials</text>
  <text x="755" y="278" text-anchor="middle" fill="#000" font-size="9">(HTTP-backed host:requires)</text>

  <!-- ── Legend ── -->
  <line x1="50" y1="535" x2="80" y2="535" stroke="#000" stroke-width="1" marker-end="url(#ar)"/>
  <text x="86" y="539" fill="#000" font-size="11">call (request/response)</text>
  <line x1="260" y1="535" x2="290" y2="535" stroke="#555" stroke-width="1" stroke-dasharray="5 3"/>
  <text x="296" y="539" fill="#000" font-size="11">event (fire-and-forget)</text>
  <line x1="475" y1="535" x2="505" y2="535" stroke="#000" stroke-width="1"/>
  <text x="511" y="539" fill="#000" font-size="11">HTTP (authenticated)</text>
  <line x1="670" y1="535" x2="700" y2="535" stroke="#000" stroke-width="1"/>
  <text x="706" y="539" fill="#000" font-size="11">internal</text>
</svg>
